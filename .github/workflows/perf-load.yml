name: Perf Load

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  k6-load:
    if: ${{ secrets.FASTAPI_STAGING_BASE_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run search load test
        env:
          FASTAPI_BASE_URL: ${{ secrets.FASTAPI_STAGING_BASE_URL }}
        run: k6 run --summary-export=perf-load-summary.json backend/perf/search-load.js

      - name: Upload perf summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-load-summary
          path: perf-load-summary.json
          if-no-files-found: ignore
